# TODO: add Spring Boot configuration for the metadata service.
server:
    port: 8081

spring:
  application:
    name: file-metadata-service

  datasource:
    url: jdbc:postgresql://localhost:5432/dropbox_metadata
    username: gkdeveshwer
    password:
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
  redis:
    host: localhost
    port: 6379

logging:
  level:
    org.hibernate.SQL: info

app:
  jwt:
    secret: mysupersecurejwtsecretkey12345678
    expiration: 3600000

  kafka:
    topics:
      metadata-events: metadata.events